# Nginx Load Balancer for Local Auto-Scaling Simulation

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=10s;

    # Upstream block for load balancing backend containers
    # Nginx will automatically resolve all instances of the "backend" service
    upstream backend_api {
        server backend:5000;
    }

    # Upstream block for load balancing frontend containers
    upstream frontend_app {
        server frontend:80;
    }

    # Backend API Load Balancer endpoint
    server {
        listen 5000;
        server_name localhost;

        location / {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Frontend App Load Balancer endpoint
    server {
        listen 3000;
        server_name localhost;

        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket support for React hot-reloading (if dev)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
